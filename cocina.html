<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San Choclito - Tablero de Cocina</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles3.css">
</head>
<body>
    <header class="navbar">
        <div class="brand"><span class="brand-text">Panel de Control</span></div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-btn">Home</a></li>
                <li><a href="platos.html" class="nav-btn">Platos</a></li>
                <li><a href="pedidos.html" class="nav-btn">Pedidos</a></li>
                <li><a href="cocina.html" class="nav-btn">Cocina</a></li>
                <li><a href="facturacion.html" class="nav-btn">Facturación</a></li>
            </ul>
        </nav>
    </header>

    <main class="cocina-container">
        <section class="tablero-header">
            <div>
                <h2 style="color: var(--color-verde-oscuro);">TABLERO DE COCINA</h2>
                <p style="color: var(--color-marron);">Gestión en tiempo real de órdenes</p>
            </div>
            
            <div class="filtros-cocina">
                <select id="filtroEstado" class="select-custom">
                    <option value="todos">Todos los Estados</option>
                    <option value="Enviado a cocina">Pendientes</option>
                    <option value="En preparación">En preparación</option>
                    <option value="Listo para servir">Listo para servir</option>
                </select>
                
                <select id="filtroPrioridad" class="select-custom">
                    <option value="todos">Todas las Prioridades</option>
                    <option value="Urgente">Urgente</option>
                    <option value="Alta">Alta</option>
                    <option value="Normal">Normal</option>
                </select>
            </div>
        </section>

        <div id="gridCocina" class="grid-pedidos">
            <!-- Las tarjetas se inyectan aquí -->
        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 San Choclito | Parcial de Desarrollo Web</p>
    </footer>

    <script src="script3.js"></script>
</body>
</html>
